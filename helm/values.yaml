replicaCount: 1

image:
  repository: registry.access.redhat.com/ubi9/nginx-124
  tag: latest
  pullPolicy: IfNotPresent

# Injected into the HTML via ConfigMap
config:
  appTitle: "Stop at 5!"
  accentColor: "#a855f7"
  targetTime: "5.000"
  winTolerance: "0.050"
  precision: "3"

# Set to false to simulate a missing-secret scenario
secret:
  create: true
  leaderboardApiKey: "changeme"

service:
  port: 8080

# Annotation used by the agent to find the source repo
sourceRepo: "Babas10/demo-stopwatch"
